<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Comm</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <nav>
            <h1>E-comm</h1>
            <button>Create Product</button>
        </nav>
        
        <div class="products">
            <div class="products-card">
                <div class="img">
                    <img src="https://picsum.photos/300/300" alt="Random Image">
                </div>
                <div class="text">
                    <h3>Name</h3>
                    <p>Description</p>
                    <p>Price</p>
                </div>

                <div class="btns">
                    <button id="update">Update</button>
                    <button id="delete">Delete</button>
                </div>
            </div>
        </div>

        <div class="form">
            <form>
                <input type="text" name="" id="" placeholder="Product Name">
                <input type="text" name="" id="" placeholder="Description">
                <input type="number" name="" id="" placeholder="Price">
                <input type="url" name="" id="" placeholder="Image URL">
                <button>Create</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
